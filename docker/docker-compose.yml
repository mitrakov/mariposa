services:
  namenode:
    image: mitrakov/hadoop:1.0.0
    hostname: namenode.host
    environment:
      - IS_MASTER=true
      - MASTER_HOST=namenode.host
      - WORKER_HOSTS=datanode1.host,datanode2.host
      - ZK_ID=1
      - HIVE_DB_PASSWORD=12345
    volumes:
      - ~/hadoop/namenode_data:/opt/hadoop/dfs/name
      - ~/hadoop/zk1_data:/opt/zookeeper/data
      - ~/hadoop/kafka1_data:/opt/kafka/data
      - ~/hadoop/postgres_data:/var/lib/postgresql/16/main
    ports:
      - "9870:9870"   # HDFS UI
      - "8085:8085"   # Airflow
      - "8088:8088"   # YARN UI
      - "18080:18080" # Spark History Server
      - "16010:16010" # HBase

  datanode1:
    image: mitrakov/hadoop:1.0.0
    hostname: datanode1.host
    environment:
      - IS_MASTER=false
      - MASTER_HOST=namenode.host
      - WORKER_HOSTS=datanode1.host,datanode2.host
      - ZK_ID=2
    volumes:
      - ~/hadoop/datanode1_data:/opt/hadoop/dfs/data
      - ~/hadoop/zk2_data:/opt/zookeeper/data
      - ~/hadoop/kafka2_data:/opt/kafka/data
    ports:
      - "8042:8042"   # NodeManager

  datanode2:
    image: mitrakov/hadoop:1.0.0
    hostname: datanode2.host
    environment:
      - IS_MASTER=false
      - MASTER_HOST=namenode.host
      - WORKER_HOSTS=datanode1.host,datanode2.host
      - ZK_ID=3
    volumes:
      - ~/hadoop/datanode2_data:/opt/hadoop/dfs/data
      - ~/hadoop/zk3_data:/opt/zookeeper/data
      - ~/hadoop/kafka3_data:/opt/kafka/data
    ports:
      - "8043:8042"   # NodeManager
