services:
  namenode:
    image: mitrakov/hadoop-krb:1.0.0
    hostname: namenode.host
    environment:
      - IS_MASTER=true
      - MASTER_HOST=namenode.host
      - WORKER_HOSTS=datanode1.host,datanode2.host
      - ZK_ID=1
      - KAFKA_CLUSTER_ID=mariposaCluster2026
      - HIVE_DB_PASSWORD=marip0sa_pGs
      - KRB5_PASSWORD=marip0sa_kRb
      - JKS_PASSWORD=marip0sa_jKs
      - HUE_PASSWORD=marip0sa_hUe
    volumes:
      - ~/hadoop/kdc_conf:/etc/krb5kdc
      - ~/hadoop/kdc_data:/var/lib/krb5kdc
      - ~/hadoop/hdfs1_data:/opt/hadoop/dfs/name
      - ~/hadoop/zk1_data:/opt/zookeeper/data
      - ~/hadoop/kafka1_data:/opt/kafka/data
      - ~/hadoop/postgres_data:/var/lib/postgresql/16/main
      - ~/hadoop/workspace:/home/hadoop/workspace
        # shared across all nodes
      - ~/hadoop/keytabs:/etc/security/keytabs
      - ~/hadoop/certs:/opt/hadoop/etc/hadoop/certs
    ports:
      - "9870:9870"   # HDFS UI http
      - "9871:9871"   # HDFS UI https
      - "8088:8088"   # YARN UI
      - "8085:8085"   # Airflow
      - "8888:8888"   # HUE
      - "18080:18080" # Spark
      - "16010:16010" # HBase

  datanode1:
    image: mitrakov/hadoop-krb:1.0.0
    hostname: datanode1.host
    environment:
      - IS_MASTER=false
      - MASTER_HOST=namenode.host
      - WORKER_HOSTS=datanode1.host,datanode2.host
      - ZK_ID=2
      - KAFKA_CLUSTER_ID=mariposaCluster2026
      - JKS_PASSWORD=marip0sa_jKs
    volumes:
      - ~/hadoop/hdfs2_data:/opt/hadoop/dfs/data
      - ~/hadoop/zk2_data:/opt/zookeeper/data
      - ~/hadoop/kafka2_data:/opt/kafka/data
        # shared across all nodes
      - ~/hadoop/keytabs:/etc/security/keytabs
      - ~/hadoop/certs:/opt/hadoop/etc/hadoop/certs
    ports:
      - "8042:8042"   # NodeManager

  datanode2:
    image: mitrakov/hadoop-krb:1.0.0
    hostname: datanode2.host
    environment:
      - IS_MASTER=false
      - MASTER_HOST=namenode.host
      - WORKER_HOSTS=datanode1.host,datanode2.host
      - ZK_ID=3
      - KAFKA_CLUSTER_ID=mariposaCluster2026
      - JKS_PASSWORD=marip0sa_jKs
    volumes:
      - ~/hadoop/hdfs3_data:/opt/hadoop/dfs/data
      - ~/hadoop/zk3_data:/opt/zookeeper/data
      - ~/hadoop/kafka3_data:/opt/kafka/data
        # shared across all nodes
      - ~/hadoop/keytabs:/etc/security/keytabs
      - ~/hadoop/certs:/opt/hadoop/etc/hadoop/certs
    ports:
      - "8043:8042"   # NodeManager
